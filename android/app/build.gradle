plugins {
    alias libs.plugins.android.application
    alias libs.plugins.google.gms.google.services
    alias libs.plugins.google.firebase.appdistribution
}

android {
    // namespace (Java package) intentionally differs from applicationId —
    // Play requires com.khalimowski.focusflow, but renaming the Java
    // packages isn't necessary and would churn every native file.
    namespace = "app.lovable.focusflow"
    compileSdk = libs.versions.compileSdk.get().toInteger()
    defaultConfig {
        applicationId "com.khalimowski.focusflow"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 17
        versionName "1.4.10"
        // Polish paused — ship English resources only (drops values-pl at
        // build time). Remove this line to re-enable.
        resConfigs "en"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    // CI-only signing (.github/workflows/play-release.yml): applied only when
    // the keystore env vars are present, so local Android Studio release
    // builds keep using the signing dialog as before.
    signingConfigs {
        release {
            if (System.getenv("ANDROID_KEYSTORE_PATH") != null) {
                storeFile file(System.getenv("ANDROID_KEYSTORE_PATH"))
                storePassword System.getenv("ANDROID_KEYSTORE_PASSWORD")
                keyAlias System.getenv("ANDROID_KEY_ALIAS")
                keyPassword System.getenv("ANDROID_KEY_PASSWORD")
            }
        }
    }
    buildTypes {
        release {
            if (System.getenv("ANDROID_KEYSTORE_PATH") != null) {
                signingConfig signingConfigs.release
            }
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    firebaseAppDistribution {
        groups = "qa-team"
        releaseNotes = "Automated release via Gradle."
        artifactType = "APK"
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation libs.androidx.appcompat
    implementation libs.androidx.coordinatorlayout
    implementation libs.androidx.core.splashscreen
    implementation project(':capacitor-android')
    testImplementation libs.junit
    androidTestImplementation libs.androidx.junit
    androidTestImplementation libs.androidx.espresso.core
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

