<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="brainGrad" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#93A9FF"/>
      <stop offset="55%" stop-color="#9AC7E4"/>
      <stop offset="100%" stop-color="#A8E6CF"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="50%" cy="36%" r="58%">
      <stop offset="0%" stop-color="#7C9CFF" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#7C9CFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="512" height="512" fill="#14161d"/>
  <rect width="512" height="512" fill="url(#bgGlow)"/>

  <!-- flow wave accent -->
  <path
    d="M 72 402 C 132 366, 182 438, 256 402 C 330 366, 380 438, 440 402"
    fill="none"
    stroke="url(#brainGrad)"
    stroke-width="10"
    stroke-linecap="round"
    opacity="0.45"
  />

  <!-- brain mark (adapted from lucide "brain" icon), centered and scaled -->
  <g
    transform="translate(256 246) scale(12.6) translate(-12 -11.5)"
    fill="none"
    stroke="url(#brainGrad)"
    stroke-width="1.7"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#softGlow)"
  >
    <path d="M12 18V5" />
    <path d="M15 13a4.17 4.17 0 0 1-3-4 4.17 4.17 0 0 1-3 4" />
    <path d="M17.598 6.5A3 3 0 1 0 12 5a3 3 0 1 0-5.598 1.5" />
    <path d="M17.997 5.125a4 4 0 0 1 2.526 5.77" />
    <path d="M18 18a4 4 0 0 0 2-7.464" />
    <path d="M19.967 17.483A4 4 0 1 1 12 18a4 4 0 1 1-7.967-.517" />
    <path d="M6 18a4 4 0 0 1-2-7.464" />
    <path d="M6.003 5.125a4 4 0 0 0-2.526 5.77" />
  </g>

</svg>
