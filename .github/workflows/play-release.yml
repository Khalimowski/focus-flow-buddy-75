# Builds the app and uploads a signed .aab to Google Play.
#
# Triggers: pushing a tag like v1.2 (publishes to the internal track), or
# manually from the Actions tab with a track of your choice.
#
# Required repository secrets (see docs/play-publishing.md for setup):
#   ANDROID_KEYSTORE_BASE64    base64 of the upload keystore (.jks)
#   ANDROID_KEYSTORE_PASSWORD  keystore password
#   ANDROID_KEY_ALIAS          key alias inside the keystore
#   ANDROID_KEY_PASSWORD       key password
#   PLAY_SERVICE_ACCOUNT_JSON  Play API service-account JSON (full contents)

name: Publish to Google Play

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      track:
        description: "Play track to publish to"
        type: choice
        default: internal
        options: [internal, alpha, beta, production]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # bun.lock pins tarballs to Lovable's private registry, which CI can't
      # reach — resolve from the public npm registry instead.
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build web bundle
        run: npm run build

      # Same steps as sync-android.bat: stage dist/client into the Android
      # project's assets and let Capacitor sync plugin config.
      - name: Stage web assets into the Android project
        run: |
          rm -rf android/app/src/main/assets/public
          mkdir -p android/app/src/main/assets/public
          if [ -f dist/client/_shell.html ]; then cp dist/client/_shell.html dist/client/index.html; fi
          cp -r dist/client/. android/app/src/main/assets/public/
          npx cap sync android

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Decode signing keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/upload-keystore.jks"

      - name: Build signed release bundle
        working-directory: android
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/upload-keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.khalimowski.focusflow
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: ${{ inputs.track || 'internal' }}
          status: completed

      - name: Keep the .aab as a workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
